name: Release

# v* 태그 푸시 시 자동 빌드 & 릴리즈
# 사용법: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin   # Apple Silicon
          - os: macos-13
            target: x86_64-apple-darwin    # Intel Mac
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      # ── 소스 체크아웃 ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js 설정 ──────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust 설정 ─────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Rust 빌드 캐시 (빌드 시간 단축)
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── 의존성 설치 ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Tauri 빌드 & GitHub Release 업로드 ───────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MD Editor ${{ github.ref_name }}"
          releaseBody: |
            ## 다운로드

            | 플랫폼 | 파일 |
            |--------|------|
            | macOS (Apple Silicon) | `MD.Editor_*_aarch64.dmg` |
            | macOS (Intel) | `MD.Editor_*_x64.dmg` |
            | Windows | `MD.Editor_*_x64-setup.exe` |

            ## 변경 사항
            _릴리즈 노트를 여기에 작성하세요._
          releaseDraft: true      # 먼저 Draft로 생성 → 검토 후 수동 Publish
          prerelease: false
          args: --target ${{ matrix.target }}
